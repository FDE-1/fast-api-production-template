services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"

  migrate:
    image: fastapi-template:latest
    command: ["alembic", "upgrade", "head"]
    environment:
      APP_DATABASE_URL: postgresql+psycopg://app:app@db:5432/app
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    image: fastapi-template:latest
    environment:
      APP_DATABASE_URL: postgresql+psycopg://app:app@db:5432/app
      APP_SECRET_KEY: ${APP_SECRET_KEY:-dev-only-change-me-32-bytes-min-abcd}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

volumes:
  pgdata: